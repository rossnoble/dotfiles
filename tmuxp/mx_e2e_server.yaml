# MX E2E Testing
#
# This requires using the tp() zshrc function which parses the current
# directory name to populate the SESSION_NAME
session_name: ${SESSION_NAME}
start_directory: ${PWD}
windows:
  - window_name: cypress-e2e-server
    layout: main-horizontal
    panes:
      - shell_command:
        - cd frontend/e2e
        - yarn start-backend
      - shell_command:
        - cd frontend/e2e
        - yarn start-frontend
      - shell_command:
        - cd frontend/e2e
        - yarn cypress:open
