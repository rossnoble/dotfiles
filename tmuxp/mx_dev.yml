# MX development template
#
# Five windows: shell / vim / opencode / tests / e2e
#
# This requires using the tp() zshrc function which parses the current
# directory name to populate the SESSION_NAME
session_name: ${SESSION_NAME}
start_directory: ${PWD}
windows:
  # Shell window for git commands etc
  - window_name: shell
    layout: main-horizontal

  # Neovim
  - window_name: editor
    layout: main-horizontal
    panes:
      - focus: true
        shell_command:
        - vim

  # Opencode / Claude
  - window_name: opencode
    layout: main-horizontal
    panes:
      - shell_command:
        # Not run automatically to prevent excess RAM usage 
        # - opencode

  # Dev servers
  - window_name: servers
    panes:
      - shell_command:
        - just backend
      - shell_command:
        - just backend-auth
      - shell_command:
        - just agents-gql
      - shell_command:
        - just agents-worker
      - shell_command:
        - # just frontend
      - shell_command:
        - just storybook

  # Docker
  - window_name: servers
    panes:
      - shell_command:
        - yarn start-docker
      - shell_command:
        - yarn start-docker-llmx
      - shell_command:
        - pods_watch
