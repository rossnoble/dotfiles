# MX development template
#
# Five windows: shell / vim / opencode / tests / e2e
#
# This requires using the tp() zshrc function which parses the current
# directory name to populate the SESSION_NAME
session_name: ${SESSION_NAME}
start_directory: ${PWD}
windows:
  # Shell window for git commands etc
  - window_name: shell
    layout: main-horizontal

  # Neovim
  - window_name: editor
    layout: main-horizontal
    panes:
      - focus: true
        shell_command:
        - vim

  # Opencode / Claude
  - window_name: ai-chat
    layout: main-horizontal
    panes:
      - shell_command:
        # Not run automatically to prevent excess RAM usage 
        # - opencode

  # Navigates to the frontend directory and starts the
  # tests in watch mode (default)
  - window_name: frontend-web
    panes:
      - shell_command:
        - cd frontend
        # Not run automatically to prevent excess RAM usage 
        # - yarn test 

  # Navigates to the e2e directory but does not run
  # the start commands
  - window_name: frontend-e2e-tests
    panes:
      - shell_command:
        - cd frontend/e2e
      - shell_command:
        - cd frontend/e2e
      - shell_command:
        - cd frontend/e2e
